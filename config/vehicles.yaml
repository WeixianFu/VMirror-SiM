# ==============================================================================
# 车辆参数配置
# 坐标系：Blender 原生（X=横向, Y=纵向/车头方向, Z=垂直向上）
# 原点：前轴中心地面投影 (0, 0, 0)
# 单位：米 (m)
# 数据来源：各品牌官方规格表（2024-2025 款），见 docs/VehicleModels.md
# ==============================================================================

# 方向约定（代码中引用）
coordinate_convention:
  forward: "+Y"    # 车头方向
  rear:    "-Y"    # 车尾方向
  left:    "-X"    # 驾驶员侧（左舵车）
  right:   "+X"    # 副驾驶侧（左舵车）
  up:      "+Z"
  down:    "-Z"

vehicles:
  suv:
    display_name: "中型 SUV (Honda CR-V 级别)"
    reference_model: "Honda CR-V 2024 (6th gen)"
    color: "orange"
    dimensions:
      overall_length: 4.704       # 官方 4704mm
      body_width: 1.866           # 官方 1866mm（不含后视镜）
      overall_height: 1.685       # 官方 1681~1691mm，取中值
      wheelbase: 2.700            # 官方 2700mm (106.3 in)
      front_overhang: 0.895       # 推算：4704 - 2700 - 1109 ≈ 895mm
    mirror_mount:
      a_pillar_setback: 0.45      # A柱相对前轴后退量
      window_sill_height: 1.25    # 窗框下沿离地高度
      left:  [-0.913, -0.45, 1.25]  # x = -(body_width/2 - 0.02)
      right: [+0.913, -0.45, 1.25]
    eye_point:
      reference: [-0.35, -0.10, 1.20]   # 50th 百分位驾驶员眼点
    rear_bumper_to_hitch: 0.3

  pickup:
    display_name: "皮卡 (Toyota Hilux 级别)"
    reference_model: "Toyota Hilux Double Cab 2024 (AN120 facelift)"
    color: "dark_blue"
    dimensions:
      overall_length: 5.325       # 官方 5265~5330mm (Double Cab)，取 5325
      body_width: 1.855           # 官方 1800~1855mm（车身，不含外扩）
      overall_height: 1.815       # 官方 1750~1880mm (Double Cab 4x4 ≈ 1815)
      wheelbase: 3.085            # 官方 3085mm
      front_overhang: 0.990       # 官方 990mm
      cargo_bed_length: 1.52      # 标准双排货箱
    mirror_mount:
      a_pillar_setback: 0.50
      window_sill_height: 1.35
      left:  [-0.908, -0.50, 1.35]  # x = -(body_width/2 - 0.02)
      right: [+0.908, -0.50, 1.35]
    eye_point:
      reference: [-0.35, -0.10, 1.35]
    rear_bumper_to_hitch: 0.3

  wagon:
    display_name: "旅行车 (VW Passat Variant 级别)"
    reference_model: "VW Passat Variant 2024 (B9)"
    color: "gunmetal_silver"
    dimensions:
      overall_length: 4.917       # 官方 4917mm
      body_width: 1.849           # 官方 1849mm（不含后视镜）
      overall_height: 1.497       # 官方 1497mm
      wheelbase: 2.841            # 官方 2841mm
      front_overhang: 0.900       # 推算：4917 - 2841 - 1176 ≈ 900mm
    mirror_mount:
      a_pillar_setback: 0.40
      window_sill_height: 1.05
      left:  [-0.905, -0.40, 1.05]  # x = -(body_width/2 - 0.02)
      right: [+0.905, -0.40, 1.05]
    eye_point:
      reference: [-0.35, -0.10, 1.05]
    rear_bumper_to_hitch: 0.3

  hatchback:
    display_name: "A级小车 (VW Polo 级别)"
    reference_model: "VW Polo 2024 (AW facelift)"
    color: "red"
    dimensions:
      overall_length: 4.074       # 官方 4074~4080mm，取 4074
      body_width: 1.751           # 官方 1751mm（不含后视镜）
      overall_height: 1.446       # 官方 1442~1450mm，取中值
      wheelbase: 2.564            # 官方 2564mm
      front_overhang: 0.760       # 推算：4074 - 2564 - 750 ≈ 760mm
    mirror_mount:
      a_pillar_setback: 0.35
      window_sill_height: 1.00
      left:  [-0.856, -0.35, 1.00]  # x = -(body_width/2 - 0.02)
      right: [+0.856, -0.35, 1.00]
    eye_point:
      reference: [-0.35, -0.10, 1.00]
    rear_bumper_to_hitch: 0.3
