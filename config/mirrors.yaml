# ==============================================================================
# 后视镜参数配置
# 单位：毫米 (mm)，除非特别标注
# 来源：docs/MirrorDesign.md
# ==============================================================================

# 镜面尺寸参考表
mirror_types:
  standard_flat:
    display_name: "标准平面镜"
    width_mm: 170
    height_mm: 110
    corner_radius_mm: 25
    curvature_radius_mm: null    # 平面镜，无曲率
    shape: "rounded_rectangle"

  standard_convex:
    display_name: "标准凸面镜"
    width_mm: 170
    height_mm: 110
    corner_radius_mm: 25
    curvature_radius_mm: [1000, 1400]   # 范围
    shape: "rounded_rectangle_convex"

  clip_on_blind_spot:
    display_name: "吸附式小凸面镜"
    diameter_mm: [60, 75]        # 圆形
    curvature_radius_mm: [400, 600]
    shape: "circular"

  towing_main:
    display_name: "拖车加长镜（主镜）"
    width_mm: 200
    height_mm: 140
    corner_radius_mm: 20
    curvature_radius_mm: [1000, 1200]
    shape: "rounded_rectangle_convex"

  towing_wide_angle:
    display_name: "拖车加长镜（广角副镜）"
    width_mm: 200
    height_mm: 80
    corner_radius_mm: 15
    curvature_radius_mm: [400, 600]
    shape: "wide_rounded_rectangle"

  electric_main:
    display_name: "电动升降镜（主镜）"
    width_mm: 190
    height_mm: 130
    corner_radius_mm: 20
    curvature_radius_mm: 1200
    shape: "rounded_rectangle_convex"

  electric_sub:
    display_name: "电动升降镜（副镜）"
    width_mm: 190
    height_mm: 70
    corner_radius_mm: 15
    curvature_radius_mm: 500
    shape: "wide_rounded_rectangle"
    adjustable: true              # 可上下移动

# 镜臂偏移量（安装基准点 → 镜面中心，单位：米）
mirror_offsets:
  standard:
    arm_length: 0.15              # 向车外侧伸出
    arm_forward: 0.02             # 略微前倾
    glass_height: 0.05            # 比安装点高
  towing:
    arm_length: 0.25              # 拖车镜臂更长
    arm_forward: 0.03
    glass_height: 0.08

# 材质参数
material:
  glossy_color: [0.9, 0.9, 0.92, 1.0]   # 略蓝，模拟真实镜面
  roughness: 0.0                          # 完美镜面

# Cycles 渲染关键设置
cycles_settings:
  glossy_bounces: 8
  max_bounces: 12

# 法规参考
regulations:
  fmvss_111:
    convex_curvature_radius_mm: [889, 1651]
    min_reflective_area_cm2: 126
  un_r46:
    note: "欧洲法规对拖车镜有额外视野覆盖要求"
