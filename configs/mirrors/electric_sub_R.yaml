# Electric sub (wide-angle) mirror — right (passenger side, LHD)
# One shared .blend is used for both sides; left / right differ only in the
# side-specific placement (sign of lateral offset and rotation from reflection).
# All linear values in meters, angles in degrees.

model: electric_sub_R
source_blend: assets/blender-mirror/electric_sub.blend    # shared asset (L/R use same mesh)
source_object: Mirror_Glass_ElectricSub

# Local-coordinate convention for this mirror:
#   origin = mount point (arm attachment to vehicle A-pillar / sail triangle)
#   +X = outward (for the RIGHT mirror, outward is world +X)
#   +Y = forward (drive direction, matches vehicle +Y)
#   +Z = up
#
# The mirror has NO global coordinates — always expressed relative to
# vehicle.mirror_mount.right. Final world pose:
#     world_pos = vehicle.mirror_mount.right + glass_center_offset.vector
# Rotation is not baked: computed dynamically from eye + target per scene.
coordinate_system: mount_relative

# Glass dimensions and analytical convex sphere geometry.
# The mesh is a dense rectangular grid whose Z follows an analytical sphere:
#   z(r) = bump - (R - sqrt(R^2 - r^2)),  with r = sqrt(x^2 + y^2)
# The dome bulges toward local +Z (center at Z = bump, rim at Z = 0); face
# normals point +Z (outward from the convex reflective side).
# The high density gives a smooth normal field so roughness 0 renders cleanly.
glass_size:
  width:  0.190     # along local X
  height: 0.070    # along local Y
  bump:   0.0096    # along local Z (convex protrusion at center, toward +Z)
geometry:
  shape:           analytical_sphere     # z(r) = bump - (R - sqrt(R^2 - r^2))
  sphere_radius:   0.5401        # m, derived from bump and half-diagonal
  mesh_resolution: [256, 256]            # quads along (X, Y)
  mesh_quads:      65536
  mesh_verts:      66049
  bulge_axis:      +Z                    # convex outward direction
  face_normals:    +Z                    # agree with bulge (outward = reflective side)

# Glass center position relative to the mount point, expressed in
# vehicle-aligned axes (mount = origin, +X = right, +Y = forward, +Z = up).
glass_center_offset:
  lateral:      0.150   # outward (for RIGHT mirror, outward = world +X)
  forward:     -0.100   # along vehicle Y (negative = rearward of mount)
  rise:        0.000    # along vehicle Z, glass at mount height (below the main mirror)
  vector: [+0.150, -0.100, +0.000]   # RIGHT: outward = +X in vehicle frame

# Orientation policy.
# Rotation is computed at scene-build time via reflection law:
#   outward_n = normalize(unit(eye − glass_center) + unit(target − glass_center))
# The mesh's convex face (+Z, where face normals point) must face the driver,
# so align local +Z with outward_n:
#   z_axis = +outward_n
#   x_axis = normalize(world_up × z_axis)
#   y_axis = z_axis × x_axis
#   rotation_matrix = [x_axis | y_axis | z_axis]
# Recomputed per vehicle/eye/target; never baked into the asset.
orientation:
  policy: dynamic_reflection
  # Reference rotation at the default pose — computed via the reflection
  # law with vehicle=passat, target=(0, -20, 0.5). Used when policy=explicit;
  # run ConfigExporter to bake values for a different vehicle.
  rotation_euler_deg: [88.950127, -0.0, -36.082271]

# Placement procedure — do NOT shift the mesh; shifting couples the offset
# to the rotation and lands the glass somewhere unintended:
#   object.location        = vehicle.mirror_mount.right + glass_center_offset.vector
#   object.rotation_euler  = dynamic reflection-law result (z_axis = +outward_n)
# The glass mesh (centered on the object origin) thus lands exactly at the
# computed world glass-center position; rotation is about that center.
placement:
  strategy: object_at_glass_world_position

# Material convention (baked into the .blend file).
# Mix Shader(factor = Geometry.Backfacing) assigns:
#   - Front face (normal = local +Z, convex / camera-facing) → Glossy BSDF (reflective mirror)
#   - Back  face (local -Z, toward the inside of the shell)  → Diffuse BSDF (dark shell)
# With the orientation policy above, the convex side faces the driver and
# the camera sees the front face → Glossy reflection.
material:
  front_face_shader: Glossy    # reflective mirror (convex side, toward driver)
  back_face_shader:  Diffuse   # dark back shell
  glossy_color:     [0.9, 0.9, 0.92]
  glossy_roughness: 0.0
  diffuse_color:    [0.02, 0.02, 0.02]
